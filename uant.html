<!DOCTYPE html><html lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mining</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}html,body{width:100%;height:100%}body{background:#1a1a1a;background-image:radial-gradient(circle,#2a2a2a 1px,transparent 1px);background-size:8px 8px;min-height:100vh;padding:10px;color:#fff;display:flex;flex-direction:column}.f{display:flex;flex-direction:column;justify-content:center;align-items:center;margin:15px 0 10px;position:relative}.wr{position:relative;width:100%;display:flex;justify-content:center}.ln{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}.ln line{stroke:#333;stroke-width:2;stroke-dasharray:6 4}.ln .pg{stroke:#ff0;stroke-width:2.5;filter:drop-shadow(0 0 4px #ff0)}.pc{position:absolute;background:#ff0;color:#000;font-size:10px;font-weight:bold;padding:2px 6px;border-radius:8px;opacity:0;transition:opacity .3s;box-shadow:0 0 8px rgba(255,255,0,.8);z-index:3}.f svg.fn{width:360px;height:360px;display:block;margin-bottom:-90px;position:relative;z-index:1}.sb{width:140px;height:80px;background:linear-gradient(145deg,#a8d8f0,#7ec1e0 40%,#5aa8cf);border:3px solid #4a3820;border-radius:14px;display:flex;justify-content:center;align-items:center;color:#3a2810;font-size:22px;font-weight:900;cursor:pointer;letter-spacing:2px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;box-shadow:0 8px 18px rgba(0,0,0,.5),inset 0 -6px 10px rgba(74,56,32,.4),inset 0 3px 6px rgba(255,255,255,.4),inset 3px 0 4px rgba(74,56,32,.25),inset -3px 0 4px rgba(74,56,32,.25);text-shadow:1px 1px 2px rgba(255,255,255,.5)}.sb.ru{background:linear-gradient(145deg,#ff8080,#e04d4d 40%,#c22b2b);color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.4)}.c{background:#252525;border-radius:15px;padding:15px}.a{text-align:center;font-size:26px;font-weight:bold;margin-bottom:12px}.b{width:100%;height:10px;background: 70-30 35-3 L0 0 Z" fill="#FFD600" transform="rotate(240)"/></g><circle r="18" fill="#0F172A"/><circle r="8" fill="white"/></g></svg></div><script>function sw(el,i){document.querySelectorAll('.t div:not(.sl)').forEach(d=>d.classList.remove('ac'));el.classList.add('ac');document.querySelector('.sl').style.transform='translateX('+(i*100)+'%)'}var rn=0,st0=0,dur=180000,tgt=120,rf,svg=document.getElementById('lns'),pcs=[pc1,pc2,pc3,pc4],ls=['l1','l2','l3','l4'].map(id=>document.getElementById(id)),ps=['p1','p2','p3','p4'].map(id=>document.getElementById(id));function up(){var wr=document.querySelector('.wr'),fs=document.querySelector('.fn').getBoundingClientRect(),wc=wr.getBoundingClientRect();svg.setAttribute('width',wc.width);svg.setAttribute('height',wc.height);svg.style.height=wc.height+'px';var cx=fs.left-wc.left+fs.width/2,cy=fs.top-wc.top+fs.height/2-70,rad=90,pts=[[cx-rad*.7,cy-rad*.7],[cx+rad*.7,cy-rad*.7],[cx-rad*.7,cy+rad*.7],[cx+rad*.7,cy+rad*.7]],cs=[[5,5],[wc.width-5,5],[5,wc.height-5],[wc.width-5,wc.height-5]];for(var i=0;i<4;i++){ls[i].setAttribute('x1',cs[i][0]);ls[i].setAttribute('y1',cs[i][1]);ls[i].setAttribute('x2',pts[i][0]);ls[i].setAttribute('y2',pts[i][1]);ps[i].setAttribute('x1',cs[i][0]);ps[i].setAttribute('y1',cs[i][1]);ps[i].setAttribute('x2',cs[i][0]);ps[i].setAttribute('y2',cs[i][1]);ps[i]._sx=cs[i][0];ps[i]._sy=cs[i][1];ps[i]._ex=pts[i][0];ps[i]._ey=pts[i][1]}}function st(){if(rn){rn=0;document.getElementById('fw').classList.remove('run');var s=document.getElementById('sb');s.classList.remove('ru');s.textContent='START';cancelAnimationFrame(rf);return}rn=1;document.getElementById('fw').classList.add('run');var s=document.getElementById('sb');s.classList.add('ru');s.textContent='STOP';st0=Date.now();rf=requestAnimationFrame(tk)}function tk(){if(!rn)return;var el=Date.now()-st0,pr=Math.min(el/dur,1),am=tgt*pr;document.getElementById('am').textContent='$'+am.toFixed(6);document.getElementById('pb').style.width=(pr*100)+'%';for(var i=0;i<4;i++){var p=ps[i],x=p._sx+(p._ex-p._sx)*pr,y=p._sy+(p._ey-p._sy)*pr;p.setAttribute('x2',x);p.setAttribute('y2',y);pcs[i].style.opacity=pr>0?1:0;pcs[i].style.left=(x-15)+'px';pcs[i].style.top=(y-20)+'px';pcs[i].textContent=Math.floor(pr*100)+'%'}if(pr<1&&rn)rf=requestAnimationFrame(tk)}window.addEventListener('load',up);window.addEventListener('resize',up);setTimeout(up,100);</script></body></html>
