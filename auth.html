<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>amana.co.com</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}html,body{height:100%;width:100%;background:#2a2d33;overflow:hidden}body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px;background:#2a2d33}.lang{position:absolute;top:20px;right:20px;background:#3a3d43;color:#eee;padding:8px 16px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:5px;border:1px solid #4a4d53}.logo{width:80px;height:80px;margin:40px auto 15px;display:flex;align-items:center;justify-content:center;overflow:hidden;filter:drop-shadow(0 4px 20px rgba(255,122,0,.25))}.logo img{width:100%;height:100%;object-fit:contain}.brand{color:#fff;text-align:center;font-size:28px;font-weight:700;margin-bottom:35px;letter-spacing:.5px}.card{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:30px 25px;min-height:420px;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.4);border:1px solid #1a1d23}.form{position:absolute;top:30px;left:25px;right:25px;bottom:30px;transition:all .5s cubic-bezier(.68,-.55,.27,1.55);opacity:1;transform:translateX(0)}.form.out-left{transform:translateX(-120%);opacity:0}.form.out-right{transform:translateX(120%);opacity:0}.form.in-right{transform:translateX(120%);opacity:0}.form.in-left{transform:translateX(-120%);opacity:0}input{width:100%;background:#f7f7f9;border:2.5px solid #ff7a00;color:#222;padding:16px 18px;border-radius:14px;font-size:14px;margin-bottom:14px;outline:none;transition:all .25s;font-weight:500}input:focus{border-color:#8a2be2;box-shadow:0 0 0 3px rgba(138,43,226,.15)}input::placeholder{color:#9a9da4}.pwd{position:relative;margin-bottom:14px;border-radius:14px;border:2.5px solid #ff7a00;background:#f7f7f9;transition:all .25s}.pwd:focus-within{border-color:#8a2be2;box-shadow:0 0 0 3px rgba(138,43,226,.15)}.pwd input{border:none;background:transparent;padding-right:45px;margin-bottom:0;box-shadow:none}.pwd input:focus{box-shadow:none}.eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;z-index:2;width:22px;height:22px;display:flex;align-items:center;justify-content:center}.eye svg{width:22px;height:22px;stroke:#7a7d84;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:all .25s}.eye .slash{stroke-dasharray:26;stroke-dashoffset:26;transition:stroke-dashoffset .3s}.eye.on .slash{stroke-dashoffset:0}.eye.on .lid-top{transform:translateY(3px) scaleY(.3);transform-origin:center}.eye.on .lid-bot{transform:translateY(-3px) scaleY(.3);transform-origin:center}.eye .lid-top,.eye .lid-bot{transition:transform .25s}.remember{color:#666;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:18px;cursor:pointer}.remember input[type=checkbox]{width:14px;height:14px;margin:0;accent-color:#ff7a00}.btn{width:100%;background:linear-gradient(90deg,#ff4d1a,#ff7a00,#c04ad6,#8a2be2);border:none;color:#fff;padding:16px;border-radius:30px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-bottom:12px;box-shadow:0 6px 20px rgba(180,80,180,.4)}.switch{text-align:center;color:#666;font-size:13px;margin-bottom:16px}.switch a{color:#8a2be2;text-decoration:none;cursor:pointer;font-weight:600}.agree{text-align:center;color:#888;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:4px}.agree .row{display:flex;align-items:center;gap:6px}.dot{width:14px;height:14px;background:linear-gradient(135deg,#ff7a00,#8a2be2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px}.agree a{color:#8a2be2;text-decoration:none;cursor:pointer}.cap-mask{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:99;padding:20px;backdrop-filter:blur(4px)}.cap-mask.show{display:flex}.cap{width:100%;max-width:360px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);border-top:4px solid #4b7bff;position:relative;transition:transform .1s}.cap.shake{animation:shk .5s cubic-bezier(.36,.07,.19,.97)}@keyframes shk{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}.cap h3{text-align:center;font-size:16px;font-weight:600;color:#222;padding:18px 10px 14px}.cap-img{position:relative;margin:0 18px;height:170px;border-radius:8px;overflow:hidden;background:#e8ecf3}.cap-img img{width:100%;height:100%;object-fit:cover;display:block;user-select:none;-webkit-user-drag:none}.piece{position:absolute;top:0;left:0;width:50px;height:50px;background-image:var(--bg);background-size:324px 170px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));pointer-events:none}.hole{position:absolute;top:60px;width:50px;height:50px;background:rgba(0,0,0,.45);border-radius:6px;pointer-events:none}.track{margin:20px 18px 14px;height:44px;background:#eef1f6;border-radius:22px;position:relative}.slider{position:absolute;top:0;left:0;height:44px;width:70px;background:#4b7bff;border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:grab;box-shadow:0 3px 10px rgba(75,123,255,.4);transition:background .2s}.slider.ok{background:#22c55e}.slider.err{background:#ef4444}.slider:active{cursor:grabbing}.slider svg{width:22px;height:22px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}.cap-foot{display:flex;gap:12px;padding:0 20px 18px;justify-content:flex-start}.cap-foot span{cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f7fa,#e4e7ec);box-shadow:0 2px 6px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.8);border:1px solid #d5d9e0;color:#555;transition:all .25s}.cap-foot span:hover{transform:translateY(-2px) rotate(8deg);box-shadow:0 4px 12px rgba(0,0,0,.2);color:#4b7bff}.cap-foot span svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}.err-bar{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff;padding:10px;text-align:center;font-size:13px;font-weight:600;transform:translateY(100%);transition:transform .35s cubic-bezier(.68,-.55,.27,1.55)}.err-bar.show{transform:translateY(0)}.suc-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}.suc-mask.show{display:flex;animation:fdi .3s}@keyframes fdi{from{opacity:0}to{opacity:1}}.suc-box{width:90%;max-width:340px;aspect-ratio:1;background:#fff;border-radius:20px;border-top:5px solid #22c55e;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,.4);transform:scale(.5);opacity:0;animation:pop .5s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes pop{to{transform:scale(1);opacity:1}}.check{width:80px;height:80px;border-radius:50%;background:#e8f9ee;display:flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative}.check::before{content:"";position:absolute;inset:-8px;border-radius:50%;border:3px solid #22c55e;border-top-color:transparent;animation:spn 1.2s linear infinite}@keyframes spn{to{transform:rotate(360deg)}}.check svg{width:44px;height:44px;stroke:#22c55e;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:50;stroke-dashoffset:50;animation:drw .6s .2s ease-out forwards}@keyframes drw{to{stroke-dashoffset:0}}.suc-txt{color:#22c55e;font-size:22px;font-weight:600;opacity:0;animation:fdi .4s .6s forwards}</style></head><body><div class="lang">🌐 English</div><div class="logo"><img src="https://i.ibb.co/qMfG6syM/IMG.png" alt="amana"></div><div class="brand">amana.co.com</div><div class="card"><div class="form" id="login"><input type="email" placeholder="Email address" id="le"><div class="pwd"><input type="password" placeholder="Login password" id="lp"><span class="eye" onclick="tog(this,'lp')"><svg viewBox="0 0 24 24"><path class="lid-top" d="M2 12s3.5-7 10-7 10 7 10 7"/><path class="lid-bot" d="M2 12s3.5 7 10 7 10-7 10-7"/><circle cx="12" cy="12" r="3"/><line class="slash" x1="4" y1="4" x2="20" y2="20"/></svg></span></div><label class="remember"><input type="checkbox">rememberMe</label><button class="btn" onclick="chk('login')">LOGIN</button><div class="switch">No account? <a onclick="sw('reg')">Register</a></div><div class="agree"><div class="row"><span class="dot">✓</span>Agree with our</div><a>《User Agreement and Privacy Policy》</a></div></div><div class="form in-right" id="reg"><input type="email" placeholder="Email address" id="re"><div class="pwd"><input type="password" placeholder="Login password" id="rp"><span class="eye" onclick="tog(this,'rp')"><svg viewBox="0 0 24 24"><path class="lid-top" d="M2 12s3.5-7 10-7 10 7 10 7"/><path class="lid-bot" d="M2 12s3.5 7 10 7 10-7 10-7"/><circle cx="12" cy="12" r="3"/><line class="slash" x1="4" y1="4" x2="20" y2="20"/></svg></span></div><div class="pwd"><input type="password" placeholder="Security password" id="sp"><span class="eye" onclick="tog(this,'sp')"><svg viewBox="0 0 24 24"><path class="lid-top" d="M2 12s3.5-7 10-7 10 7 10 7"/><path class="lid-bot" d="M2 12s3.5 7 10 7 10-7 10-7"/><circle cx="12" cy="12" r="3"/><line class="slash" x1="4" y1="4" x2="20" y2="20"/></svg></span></div><input type="text" placeholder="f5rsyr" id="rc"><button class="btn" onclick="chk('reg')">REGISTER</button><div class="switch">Already have an account? <a onclick="sw('login')">Login</a></div><div class="agree"><div class="row"><span class="dot">✓</span>Agree with our</div><a>《User Agreement and Privacy Policy》</a></div></div></div><div class="cap-mask" id="cm"><div class="cap" id="cb"><h3>Slide to complete the puzzle</h3><div class="cap-img"><img id="ci" src="https://picsum.photos/seed/amana/324/170" alt=""><div class="piece" id="pc"></div><div class="hole" id="hl"></div></div><div class="track" id="tr"><div class="slider" id="sl"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div></div><div class="cap-foot"><span onclick="cc()" title="Close"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></span><span onclick="rs()" title="Refresh"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></span></div><div class="err-bar" id="eb">✕ Verification failed, please try again</div></div></div><div class="suc-mask" id="sm"><div class="suc-box"><div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="suc-txt">Verification Success</div></div></div><script>
function tog(el,i){const e=document.getElementById(i);const on=e.type==='password';e.type=on?'text':'password';el.classList.toggle('on',on)}
function sw(t){const l=document.getElementById('login'),r=document.getElementById('reg');if(t==='reg'){l.classList.add('out-left');l.classList.remove('in-left');r.classList.remove('in-right');r.classList.remove('out-right')}else{r.classList.add('out-right');r.classList.remove('in-right');l.classList.remove('out-left');l.classList.remove('in-left')}}
function chk(m){let ok=true;if(m==='login'){if(!document.getElementById('le').value||!document.getElementById('lp').value)ok=false}else{if(!document.getElementById('re').value||!document.getElementById('rp').value||!document.getElementById('sp').value||!document.getElementById('rc').value)ok=false}if(!ok){alert('Please fill all fields');return}openCap()}
let TX=0,SX=0,drag=false,sw2=0,pw=0;
function openCap(){document.getElementById('cm').classList.add('show');rs()}
function cc(){document.getElementById('cm').classList.remove('show')}
function rs(){const img=document.getElementById('ci');img.src='https://picsum.photos/seed/'+Math.random()+'/324/170';const pc=document.getElementById('pc'),hl=document.getElementById('hl'),sl=document.getElementById('sl'),tr=document.getElementById('tr');pc.style.setProperty('--bg','url('+img.src+')');const iw=document.querySelector('.cap-img').clientWidth||288;pw=iw;TX=60+Math.floor(Math.random()*(iw-130));pc.style.backgroundPosition=`-${TX}px -60px`;pc.style.left='0px';pc.style.top='60px';hl.style.left=TX+'px';sl.style.left='0px';sl.classList.remove('ok','err');document.getElementById('eb').classList.remove('show');sw2=tr.clientWidth-sl.clientWidth}
const sl=document.getElementById('sl');
function st(e){drag=true;SX=(e.touches?e.touches[0].clientX:e.clientX)-parseFloat(sl.style.left||0);e.preventDefault()}
function mv(e){if(!drag)return;let x=(e.touches?e.touches[0].clientX:e.clientX)-SX;if(x<0)x=0;if(x>sw2)x=sw2;sl.style.left=x+'px';const iw=document.querySelector('.cap-img').clientWidth;const px=x/sw2*(iw-50);document.getElementById('pc').style.left=px+'px'}
function en(){if(!drag)return;drag=false;const x=parseFloat(sl.style.left||0);const iw=document.querySelector('.cap-img').clientWidth;const px=x/sw2*(iw-50);if(Math.abs(px-TX)<6){sl.classList.add('ok');setTimeout(()=>{cc();document.getElementById('sm').classList.add('show');setTimeout(()=>{document.getElementById('sm').classList.remove('show')},2200)},400)}else{sl.classList.add('err');const cb=document.getElementById('cb'),eb=document.getElementById('eb');cb.classList.add('shake');eb.classList.add('show');setTimeout(()=>cb.classList.remove('shake'),500);setTimeout(rs,1400)}}
sl.addEventListener('mousedown',st);sl.addEventListener('touchstart',st,{passive:false});
document.addEventListener('mousemove',mv);document.addEventListener('touchmove',mv,{passive:false});
document.addEventListener('mouseup',en);document.addEventListener('touchend',en);
</script></body></html>
