<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>amana.co.com</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}html,body{height:100%;width:100%;background:#fff;overflow:hidden}body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px;background:#fff}.lang{position:absolute;top:20px;right:20px;background:#f0f0f0;color:#333;padding:8px 16px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:5px;border:1px solid #e0e0e0}.logo{width:80px;height:80px;margin:40px auto 15px;display:flex;align-items:center;justify-content:center;overflow:hidden;filter:drop-shadow(0 4px 20px rgba(255,122,0,.25))}.logo img{width:100%;height:100%;object-fit:contain}.brand{color:#222;text-align:center;font-size:28px;font-weight:700;margin-bottom:35px;letter-spacing:.5px}.card{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:30px 25px;min-height:420px;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.08);border:1px solid #f0f0f0}.form{position:absolute;top:30px;left:25px;right:25px;bottom:30px;transition:all .5s cubic-bezier(.68,-.55,.27,1.55);opacity:1;transform:translateX(0)}.form.out-left{transform:translateX(-120%);opacity:0}.form.out-right{transform:translateX(120%);opacity:0}.form.in-right{transform:translateX(120%);opacity:0}.form.in-left{transform:translateX(-120%);opacity:0}input{width:100%;background:#f7f7f9;border:1px solid #ececec;color:#222;padding:16px 18px;border-radius:12px;font-size:14px;margin-bottom:14px;outline:none;transition:border .2s}input:focus{border-color:#ff7a00}input::placeholder{color:#9a9da4}.pwd{position:relative}.pwd input{padding-right:45px}.eye{position:absolute;right:16px;top:26px;color:#9a9da4;cursor:pointer;font-size:16px}.remember{color:#666;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:18px;cursor:pointer}.remember input[type=checkbox]{width:14px;height:14px;margin:0;accent-color:#ff7a00}.btn{width:100%;background:linear-gradient(90deg,#ff4d1a,#ff7a00,#ffa11a);border:none;color:#fff;padding:16px;border-radius:30px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-bottom:12px;box-shadow:0 6px 20px rgba(255,122,0,.35)}.switch{text-align:center;color:#666;font-size:13px;margin-bottom:16px}.switch a{color:#e53935;text-decoration:none;cursor:pointer;font-weight:600}.agree{text-align:center;color:#888;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:4px}.agree .row{display:flex;align-items:center;gap:6px}.dot{width:14px;height:14px;background:#ff7a00;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px}.agree a{color:#e53935;text-decoration:none;cursor:pointer}</style></head><body><div class="lang">🌐 English</div><div class="logo"><img src="https://i.ibb.co/qMfG6syM/IMG.png" alt="amana"></div><div class="brand">amana.co.com</div><div class="card"><div class="form" id="login"><input type="email" placeholder="Email address"><div class="pwd"><input type="password" placeholder="Login password" id="lp"><span class="eye" onclick="tog('lp')">👁</span></div><label class="remember"><input type="checkbox">rememberMe</label><button class="btn">LOGIN</button><div class="switch">No account? <a onclick="sw('reg')">Register</a></div><div class="agree"><div class="row"><span class="dot">✓</span>Agree with our</div><a>《User Agreement and Privacy Policy》</a></div></div><div class="form in-right" id="reg"><input type="email" placeholder="Email address"><div class="pwd"><input type="password" placeholder="Login password" id="rp"><span class="eye" onclick="tog('rp')">👁</span></div><div class="pwd"><input type="password" placeholder="Security password" id="sp"><span class="eye" onclick="tog('sp')">👁</span></div><input type="text" placeholder="f5rsyr"><button class="btn">REGISTER</button><div class="switch">Already have an account? <a onclick="sw('login')">Login</a></div><div class="agree"><div class="row"><span class="dot">✓</span>Agree with our</div><a>《User Agreement and Privacy Policy》</a></div></div></div><script>function tog(i){const e=document.getElementById(i);e.type=e.type==='password'?'text':'password'}function sw(t){const l=document.getElementById('login'),r=document.getElementById('reg');if(t==='reg'){l.classList.add('out-left');l.classList.remove('in-left');r.classList.remove('in-right');r.classList.remove('out-right')}else{r.classList.add('out-right');r.classList.remove('in-right');l.classList.remove('out-left');l.classList.remove('in-left')}}</script></body></html>
