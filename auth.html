rder-top:4px solid #4b7bff}.cap h3{text-align:center;font-size:16px;font-weight:600;color:#222;padding:18px 10px 14px}.cap-img{position:relative;margin:0 18px;height:170px;border-radius:8px;overflow:hidden;background:#e8ecf3}.cap-img img{width:100%;height:100%;object-fit:cover;user-select:none;-webkit-user-drag:none}.piece{position:absolute;top:0;left:0;width:50px;height:50px;background-image:var(--bg);background-size:324px 170px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));pointer-events:none}.hole{position:absolute;top:60px;width:50px;height:50px;background:rgba(0,0,0,.45);border-radius:6px;pointer-events:none}.track{margin:20px 18px 14px;height:44px;background:#eef1f6;border-radius:22px;position:relative}.slider{position:absolute;top:0;left:0;height:44px;width:70px;background:#4b7bff;border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:grab;box-shadow:0 3px 10px rgba(75,123,255,.4);transition:background .2s}.slider.ok{background:#22c55e}.slider.err{background:#ef4444}.slider svg{width:22px;height:22px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;transform:scaleX(-1)}.cap-foot{display:flex;gap:16px;padding:0 20px 18px;color:#999}.cap-foot span{cursor:pointer;width:26px;height:26px;border:1.5px solid #bbb;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}.tip{text-align:center;font-size:12px;color:#ef4444;height:14px;margin-bottom:6px}.sk{position:fixed;inset:0;background:#d5d7db;z-index:9999;display:flex;flex-direction:column;align-items:center;padding:40px 20px;overflow:hidden}.sk.hide{display:none}.sh{background:linear-gradient(90deg,#e2e4e8 0%,#eef0f3 50%,#e2e4e8 100%);background-size:200% 100%;animation:shm 1.2s infinite;border-radius:12px}@keyframes shm{0%{background-position:200% 0}100%{background-position:-200% 0}}.sk-lang{position:absolute;top:20px;left:20px;width:100px;height:34px;border-radius:20px}.sk-logo{width:80px;height:80px;border-radius:50%;margi
