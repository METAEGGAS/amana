<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Zenomining</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}body{min-height:100vh;background:#fff;display:flex;justify-content:center;align-items:center;padding:20px}.phone{width:100%;max-width:340px;background:#1a1d24;border-radius:40px;padding:30px 25px;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;overflow:hidden;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.03) 1px,transparent 0);background-size:8px 8px}.lang{position:absolute;top:20px;right:20px;background:#2a2d34;color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:5px}.notch{width:8px;height:8px;background:#000;border-radius:50%;position:absolute;top:15px;left:50%;transform:translateX(-50%)}.logo{width:60px;height:60px;background:#2b7fff;border-radius:50%;margin:35px auto 12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:32px;font-style:italic}.brand{color:#fff;text-align:center;font-size:22px;font-weight:600;margin-bottom:25px}.card{background:#22252c;border-radius:16px;padding:22px 18px;min-height:340px;position:relative;overflow:hidden}.form{position:absolute;top:22px;left:18px;right:18px;bottom:22px;transition:all .5s cubic-bezier(.68,-.55,.27,1.55);opacity:1;transform:translateX(0)}.form.out-left{transform:translateX(-120%);opacity:0}.form.out-right{transform:translateX(120%);opacity:0}.form.in-right{transform:translateX(120%);opacity:0}.form.in-left{transform:translateX(-120%);opacity:0}input{width:100%;background:#2a2d34;border:none;color:#fff;padding:14px 16px;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}input::placeholder{color:#8a8d94}.pwd{position:relative}.pwd input{padding-right:40px}.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#8a8d94;cursor:pointer;font-size:16px}.remember{color:#8a8d94;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer}.remember input[type=checkbox]{width:14px;height:14px;margin:0;accent-color:#ff6b1a}.btn{width:100%;background:linear-gradient(90deg,#ff4d1a,#ffa11a);border:none;color:#fff;padding:14px;border-radius:25px;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-bottom:10px}.switch{text-align:center;color:#8a8d94;font-size:13px;margin-bottom:14px}.switch a{color:#ff6b1a;text-decoration:none;cursor:pointer;font-weight:600}.agree{text-align:center;color:#8a8d94;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:4px}.agree .row{display:flex;align-items:center;gap:6px}.dot{width:14px;height:14px;background:#ff6b1a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px}.agree a{color:#ff6b1a;text-decoration:none}</style></head><body><div class="phone"><div class="notch"></div><div class="lang">🌐 English</div><div class="logo">Z</div><div class="brand">Zenomining</div><div class="card"><div class="form" id="login"><input type="email" placeholder="Email address"><div class="pwd"><input type="password" placeholder="Login password" id="lp"><span class="eye" onclick="tog('lp')">👁</span></div><label class="remember"><input type="checkbox">rememberMe</label><button class="btn">LOGIN</button><div class="switch">No account? <a onclick="sw('reg')">Register</a></div><div class="agree"><div class="row"><span class="dot">✓</span>Agree with our</div><a>《User Agreement and Privacy Policy》</a></div></div><div class="form in-right" id="reg"><input type="email" placeholder="Email address"><div class="pwd"><input type="password" placeholder="Login password" id="rp"><span class="eye" onclick="tog('rp')">👁</span></div><div class="pwd"><input type="password" placeholder="Security password" id="sp"><span class="eye" onclick="tog('sp')">👁</span></div><input type="text" placeholder="f5rsyr"><button class="btn">REGISTER</button><div class="switch">Already have an account? <a onclick="sw('login')">Login</a></div><div class="agree"><div class="row"><span class="dot">✓</span>Agree with our</div><a>《User Agreement and Privacy Policy》</a></div></div></div></div><script>function tog(i){const e=document.getElementById(i);e.type=e.type==='password'?'text':'password'}function sw(t){const l=document.getElementById('login'),r=document.getElementById('reg');if(t==='reg'){l.classList.add('out-left');r.classList.remove('in-right');r.classList.remove('out-right')}else{r.classList.add('out-right');l.classList.remove('out-left');l.classList.remove('in-left')}}</script></body></html>
