<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#3b0764"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>HOME</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,Arial,sans-serif}html{background:#3b0764}body{background:radial-gradient(ellipse at top,#4c1d95,#3b0764 40%,#2e1065);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:calc(env(safe-area-inset-top) + 40px) 16px 30px;overflow-x:hidden;position:relative}.char-wrap{width:130px;height:130px;margin-bottom:14px;z-index:1}.char-wrap img{width:100%;height:100%;object-fit:contain;animation:fl 3s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(0,0,0,.5))}@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.tabs{display:flex;width:100%;max-width:380px;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);background:#2e1065;margin-bottom:18px;z-index:1;position:relative}.tab{flex:1;padding:14px;text-align:center;color:#c4b5fd;font-size:15px;font-weight:700;cursor:pointer;transition:.3s;border:none;background:transparent}.tab.active{background:linear-gradient(180deg,#7c3aed,#5b21b6);color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5);box-shadow:inset 0 -4px 0 #F5871F,inset 0 2px 0 rgba(255,255,255,.25)}.form-card{width:100%;max-width:380px;background:linear-gradient(160deg,#4c1d95,#3b0764);border-radius:18px;padding:24px 20px;box-shadow:0 10px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1),inset 0 -2px 0 rgba(0,0,0,.3);border:1px solid rgba(124,58,237,.35);position:relative;z-index:1}.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#F5871F,transparent);border-radius:18px 18px 0 0}.form{display:none}.form.active{display:block;animation:fd .3s ease}@keyframes fd{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.field{margin-bottom:16px}.field label{display:block;color:#e9d5ff;font-size:13px;margin-bottom:6px;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.3)}.inp{width:100%;padding:13px 14px;background:#2e1065;border:2px solid rgba(124,58,237,.35);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:.3s;box-shadow:inset 0 3px 6px rgba(0,0,0,.35)}.inp:focus{border-color:#F5871F;box-shadow:0 0 0 3px rgba(245,135,31,.12),inset 0 3px 6px rgba(0,0,0,.35)}.inp::placeholder{color:#a855f7;opacity:.5}.code-row{display:flex;gap:10px;align-items:stretch}.code-row .inp{flex:1}.send-btn{padding:13px 18px;background:linear-gradient(180deg,#F5871F,#f5a623);border:none;border-radius:10px;color:#3b0764;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:.3s;box-shadow:0 4px 14px rgba(245,135,31,.45),inset 0 2px 0 rgba(255,255,255,.35),inset 0 -2px 0 rgba(0,0,0,.15)}.send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(245,135,31,.55)}.send-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}.check-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.check-left{display:flex;align-items:center;gap:8px}.check-left input{width:18px;height:18px;accent-color:#7c3aed;cursor:pointer}.check-left label{color:#e9d5ff;font-size:12px;cursor:pointer;text-shadow:0 1px 2px rgba(0,0,0,.3)}.forgot{color:#F5871F;font-size:12px;font-weight:700;text-decoration:none;transition:.3s}.forgot:hover{text-decoration:underline}.submit-btn{width:100%;padding:15px;background:linear-gradient(180deg,#7c3aed,#5b21b6);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:.3s;box-shadow:0 8px 24px rgba(124,58,237,.5),inset 0 -4px 0 rgba(0,0,0,.25),inset 0 2px 0 rgba(255,255,255,.2);text-shadow:0 2px 4px rgba(0,0,0,.3)}.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,58,237,.6)}.submit-btn:active{transform:translateY(0)}</style></head><body><div class="char-wrap"><img src="https://i.ibb.co/hQXnh02/d-avatar-lawyer-white-background-featuring-icon-representing-legal-profession-ideal-themed-designs-3.png" alt="user"></div><div class="tabs"><button class="tab active" onclick="sw(this,'login')">تسجيل الدخول</button><button class="tab" onclick="sw(this,'signup')">انشاء حساب</button></div><div class="form-card"><form class="form active" id="login" onsubmit="return false"><div class="field"><label>ادخل البريد الإلكتروني</label><input class="inp" type="email" placeholder="example@mail.com" required></div><div class="field"><label>كلمة السر</label><input class="inp" type="password" placeholder="••••••••" required></div><div class="check-row"><div class="check-left"><input type="checkbox" id="terms"><label for="terms">اوافق على الشروط</label></div><a href="#" class="forgot">نسيت كلمة المرور!</a></div><button class="submit-btn" type="submit">تسجيل الدخول</button></form><form class="form" id="signup" onsubmit="return false"><div class="field"><label>ادخل البريد الإلكتروني</label><input class="inp" type="email" placeholder="example@mail.com" required></div><div class="field"><label>ادخل كلمة السر</label><input class="inp" type="password" placeholder="••••••••" required></div><div class="field"><label>كود التحقق</label><div class="code-row"><input class="inp" type="text" placeholder="ادخل الكود" required><button class="send-btn" id="sendBtn" type="button" onclick="startTimer()">ارسال</button></div></div><div class="field"><label>كود الاحالة</label><input class="inp" type="text" placeholder="كود الاحالة (اختياري)"></div><button class="submit-btn" type="submit">انشاء حساب</button></form></div><script>function sw(b,t){document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('active')});document.querySelectorAll('.form').forEach(function(e){e.classList.remove('active')});b.classList.add('active');document.getElementById(t).classList.add('active')}var tmr;function startTimer(){var b=document.getElementById('sendBtn');var c=60;b.disabled=true;b.style.opacity='.7';b.textContent=c+' ثانية';clearInterval(tmr);tmr=setInterval(function(){c--;if(c<=0){clearInterval(tmr);b.disabled=false;b.style.opacity='1';b.textContent='ارسال'}else{b.textContent=c+' ثانية'}},1000)}</script></body></html>
