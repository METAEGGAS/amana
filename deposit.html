:#fff;font-size:22px;cursor:pointer;padding:3px;line-height:1}.rh h1{font-size:15px;font-weight:500}.rc{margin:12px 14px 0;background:#16213a;border-radius:12px;padding:12px}.tb{background:#0f1a2e;border-radius:26px;padding:4px;display:flex;position:relative}.tb .sl{position:absolute;top:4px;bottom:4px;width:calc(50% - 4px);background:#3ba9dc;border-radius:22px;transition:transform .3s cubic-bezier(.22,.9,.36,1);z-index:0}.tb .sl.r{transform:translateX(100%)}.tb .tab{flex:1;text-align:center;padding:10px;font-size:12.5px;color:#8a95a8;cursor:pointer;border-radius:22px;transition:color .25s;z-index:1;position:relative}.tb .tab.on{color:#fff;font-weight:600}.fr{display:flex;justify-content:flex-end;padding:12px 4px 0;min-height:31px;align-items:center;position:relative}.fr img{width:19px;height:19px;filter:invert(1);opacity:.85;cursor:pointer}.em{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 0 50px;position:relative}.em img{width:110px;height:110px;object-fit:contain;opacity:.9}.em span{margin-top:14px;color:#5a6a85;font-size:12.5px}.em .dsp{width:38px;height:38px;border:3px dashed #3ba9dc;border-radius:50%;animation:sp2 1.1s linear infinite;margin-bottom:10px}.em .lt{color:#3ba9dc;font-size:12.5px;margin-top:4px}.mk{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:none;align-items:flex-end}.mk.s{display:flex}.mn{width:100%;background:#1e1f24;border-radius:14px 14px 0 0;padding:8px 0 0;max-height:80vh;overflow-y:auto;direction:rtl;animation:up .25s ease-out}@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}.mn .it{padding:16px;text-align:center;font-size:14px;color:#e6e8ee;border-bottom:1px solid #2a2b31;cursor:pointer}.mn .it.hl{color:#3ba9dc}.mn .cn{padding:16px;text-align:center;font-size:14px;color:#e6e8ee;margin-top:6px;background:#1e1f24;cursor:pointer;border-top:6px solid #0f1a2e}</style></head><body><div id="c"><div id="p1" class="v a"><div class="h"><h1>تعبئة رصيد</h1><but
